services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./gomoku.db}
      - HOST=0.0.0.0
      - PORT=8000
      - RENDER=true
    volumes:
      - game_data:/app/gomoku.db
    restart: unless-stopped

volumes:
  game_data:
