services:
  - type: web
    name: gokomu-online
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    buildContext: .
    envVars:
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - key: RENDER
        value: "true"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: gokomu-db
          property: connectionString
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: gokomu-db
    databaseName: gokomu
    plan: free
