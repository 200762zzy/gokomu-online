name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python deps
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Pack EXE
        run: python backend/build_exe.py
        env:
          PYINSTALLER_DISTPATH: dist\GomokuOnline

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GomokuOnline/GomokuOnline.exe
          generate_release_notes: true
